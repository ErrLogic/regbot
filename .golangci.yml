version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - revive
    - staticcheck
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
        - name: context-as-argument
        - name: error-return
        - name: error-strings

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
