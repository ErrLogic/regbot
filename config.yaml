# RegBot sample configuration. Copy to config.local.yaml for real use and keep
# real email addresses/credentials out of version control.
#
# Environment overrides use the REGBOT_ prefix with underscores for nested keys,
# e.g. REGBOT_APPIUM_SERVER_URL=http://127.0.0.1:4723

appium:
  server_url: "http://127.0.0.1:4723"
  new_command_timeout: 300s   # keep the UiAutomator2 session alive across full flows (incl. OTP waits)

device:
  platform_name: "Android"
  device_name: "emulator-5554"
  automation_name: "UiAutomator2"
  udid: ""                       # optional; pins a specific device

apps:
  instagram_package: "com.instagram.android"
  instagram_activity: "com.instagram.mainactivity.MainActivity"
  tiktok_package: "com.ss.android.ugc.trill"
  gmail_package: "com.google.android.gm"

email:
  address: ""                          # explicit address, OR set base_address:
  base_address: "myaccount@gmail.com"  # for +alias generation
  alias_tag_prefix: "reg"              # -> myaccount+reg<rand>@gmail.com

otp:
  sender_allowlist: ["instagram", "tiktok", "no-reply"]
  code_regex: "\\d{6}"
  wait_timeout: 60s
  poll_interval: 5s

account:
  password_length: 16
  username_prefix: "user"
  use_google_sso: false   # TikTok: register via on-device Google account (skips email OTP)

timeouts:
  element_wait: 15s
  step_retry: 2       # retries per step (attempts = step_retry + 1)
  step_backoff: 1s    # delay between step attempts

paths:
  locators_dir: "./locators"
  artifacts_dir: "./artifacts"

logging:
  level: "info"
  file: "./regbot.log"

# --- Server mode configuration (used by regbot-server + regbot-worker) ---

server:
  host: "0.0.0.0"
  port: 8080
  jwt_secret: ""          # set via REGBOT_SERVER_JWT_SECRET env var (required for server)
  shutdown_timeout: 10s

db:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  database: "regbot"
  sslmode: "disable"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
